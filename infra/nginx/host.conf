# PA host nginx config
#
# Caching strategy matches apps/pa-host/src/stale-chunk.ts:
#   - HTML / JSON manifests: no-cache (fresh on every load)
#   - Hashed chunk assets: 1 year, immutable (content-hashed by Vite)
#
# The /api proxy sends backend requests to the weekly-commit-api container.
# The /remotes/weekly-commit proxy serves the remote bundle so host and
# remote share the same origin (no CORS fiddling).

server {
    listen       8080;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Backend API
    location /api/ {
        proxy_pass http://weekly-commit-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Federated remote
    location /remotes/weekly-commit/ {
        proxy_pass http://weekly-commit-remote:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Hashed assets — long cache, immutable.
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — HTML is non-cacheable so stale-chunk detection works.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
