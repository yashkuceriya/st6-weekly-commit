# Weekly Commit remote — serves the federated bundle.
#
# All content is either the remoteEntry.js manifest or a hashed chunk.
# Manifest is no-cache; hashed chunks get immutable long-cache.

server {
    listen       8080;
    server_name  _;

    root /usr/share/nginx/html;

    gzip on;
    gzip_types application/javascript application/json;
    gzip_min_length 1024;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /assets/remoteEntry.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
